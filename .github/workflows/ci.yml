name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Analyze and test (Dart 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.11.0"

      - name: Install dependencies
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Analyze
        run: dart run melos exec --fail-fast -- dart analyze .

      - name: Test
        run: dart run melos exec --fail-fast --dir-exists=test -- dart test
